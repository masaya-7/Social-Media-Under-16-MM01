<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>YouTube</title>
<link rel="icon" href="data:,">
<style>
  :root{
    --yt-bg:#fff;
    --yt-text:#0f0f0f;
    --yt-secondary:#606060;
    --yt-border:#e5e5e5;
    --yt-link:#065fd4;
    --yt-chip-bg:#f2f2f2;
    --yt-red:#cc0000;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--yt-bg);color:var(--yt-text);
    font-family:"Roboto","Arial",Helvetica,sans-serif;}
  #app{width:100%;}
  .yt-header{width:100%;}
  #error{max-width:600px;margin:80px auto;text-align:center;color:var(--yt-secondary);
    font-size:14px;padding:0 20px;}

  /* ---------- shared layout ---------- */
  .page{width:100%;max-width:1500px;margin:0 auto;padding:12px 24px 40px;}
  .layout{display:flex;gap:24px;align-items:flex-start;}
  .left-col{flex:1 1 0;min-width:0;}
  .right-col{width:430px;flex-shrink:0;}
  .player-wrap{width:100%;background:#000;border-radius:12px;overflow:hidden;}
  .player-inner{position:relative;padding-top:56.25%;}
  .player-inner iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}

  /* control condition: video only, nothing else */
  body.control .page{max-width:900px;padding:0;}
  body.control{display:flex;align-items:center;min-height:100vh;background:#000;}
  body.control .player-wrap{background:#000;border-radius:0;}

  body.dark{
    --yt-bg:#0f0f0f;
    --yt-text:#f1f1f1;
    --yt-secondary:#aaaaaa;
    --yt-border:#3f3f3f;
    --yt-chip-bg:#272727;
  }
  body.dark .avatar{filter:brightness(0.95);}

  @media (max-width:860px){
    .layout{flex-direction:column;}
    .right-col{width:100%;}
  }

  /* ---------- meta row (title, views, date) ---------- */
  .meta{padding:12px 0 0;}
  .video-title{font-size:18px;font-weight:400;line-height:1.4;margin:0 0 8px;color:var(--yt-text);}
  .view-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;
    padding-bottom:12px;border-bottom:1px solid var(--yt-border);}
  .view-count{font-size:14px;color:var(--yt-secondary);}
  .view-count .dot{margin:0 4px;}

  /* ---------- action buttons (like) ---------- */
  .actions{display:flex;gap:8px;align-items:center;}
  .like-pill{display:flex;align-items:center;background:var(--yt-chip-bg);border-radius:18px;
    overflow:hidden;height:36px;}
  .like-btn{display:flex;align-items:center;gap:6px;padding:0 14px;height:100%;font-size:14px;
    font-weight:500;color:var(--yt-text);cursor:default;user-select:none;}
  .like-btn svg{width:18px;height:18px;fill:none;stroke:var(--yt-text);stroke-width:1.7;}
  .divider-v{width:1px;height:24px;background:#d3d3d3;}

  /* ---------- channel row ---------- */
  .channel-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
    padding:12px 0;border-bottom:1px solid var(--yt-border);}
  .channel-left{display:flex;align-items:center;gap:12px;}
  .avatar{width:40px;height:40px;border-radius:50%;background:#909090;color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0;}
  .channel-name{font-size:15px;font-weight:500;color:var(--yt-text);}
  .subscribe-btn{background:var(--yt-red);color:#fff;border:none;border-radius:18px;
    padding:0 16px;height:36px;font-size:14px;font-weight:500;cursor:default;}

  /* ---------- top header (YouTube-style nav bar) ---------- */
  .yt-header{width:100%;height:56px;display:flex;align-items:center;justify-content:space-between;
    gap:16px;padding:0 16px;border-bottom:1px solid var(--yt-border);background:var(--yt-bg);
    position:fixed;top:0;left:0;z-index:10;}
  body.control .yt-header{display:none;}
  #app{padding-top:56px;}
  body.control #app{padding-top:0;}

  .header-left{display:flex;align-items:center;gap:16px;flex-shrink:0;}
  .icon-btn{display:flex;align-items:center;justify-content:center;width:40px;height:40px;
    border-radius:50%;border:none;background:transparent;cursor:pointer;color:var(--yt-text);flex-shrink:0;}
  .icon-btn:hover{background:var(--yt-chip-bg);}
  .icon-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.7;}

  .yt-logo{display:flex;align-items:center;gap:4px;}
  .yt-logo .play-icon{width:30px;height:21px;background:var(--yt-red);border-radius:6px;
    display:flex;align-items:center;justify-content:center;}
  .yt-logo .play-icon svg{width:11px;height:11px;fill:#fff;}
  .yt-logo .wordmark{font-size:20px;font-weight:500;letter-spacing:-0.5px;color:var(--yt-text);}

  .header-center{flex:1;display:flex;align-items:center;justify-content:center;max-width:640px;}
  .search-bar{flex:1;height:40px;border:1px solid var(--yt-border);border-radius:20px 0 0 20px;
    padding:0 16px;display:flex;align-items:center;color:var(--yt-secondary);font-size:15px;background:var(--yt-bg);}
  .search-btn{width:60px;height:40px;background:var(--yt-chip-bg);border:1px solid var(--yt-border);
    border-left:0;border-radius:0 20px 20px 0;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .search-btn svg{width:18px;height:18px;fill:none;stroke:var(--yt-text);stroke-width:2;}
  .mic-btn{margin-left:12px;background:var(--yt-chip-bg);}
  .mic-btn svg{stroke:none;fill:currentColor;width:18px;height:18px;}

  .header-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .header-avatar{width:32px;height:32px;border-radius:50%;color:#fff;display:flex;align-items:center;
    justify-content:center;font-size:13px;font-weight:600;margin-left:6px;}

  .icon-moon{display:none;}
  body.dark .icon-sun{display:none;}
  body.dark .icon-moon{display:block;}

  @media (max-width:860px){
    .header-center{display:none;}
    .header-left .icon-btn{display:none;}
  }
  .comments{padding:0;position:sticky;top:68px;max-height:calc(100vh - 84px);
    overflow-y:auto;}
  .comments-header{font-size:16px;font-weight:500;margin:0 0 20px;position:sticky;top:0;
    background:var(--yt-bg);padding:4px 0;}
  @media (max-width:860px){
    .comments{position:static;max-height:none;overflow-y:visible;}
  }
  .comment{display:flex;gap:12px;margin-bottom:20px;}
  .comment .avatar{width:36px;height:36px;font-size:14px;}
  .comment-body{flex:1;min-width:0;}
  .comment-meta{font-size:13px;color:var(--yt-text);margin-bottom:2px;}
  .comment-meta .author{font-weight:500;margin-right:6px;}
  .comment-meta .time{color:var(--yt-secondary);font-weight:400;}
  .comment-text{font-size:14px;line-height:1.4;margin:0 0 6px;color:var(--yt-text);}
  .comment-actions{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--yt-secondary);}
  .comment-actions .like-icon{display:flex;align-items:center;gap:5px;}
  .comment-actions svg{width:14px;height:14px;fill:none;stroke:var(--yt-secondary);stroke-width:2;}

  /* ---------- up next (recommended videos) ---------- */
  .upnext{margin-top:20px;}
  .upnext-item{display:flex;gap:8px;margin-bottom:10px;}
  .upnext-thumb{width:168px;height:94px;border-radius:8px;flex-shrink:0;position:relative;
    overflow:hidden;background:linear-gradient(135deg,#4a4a4a,#232323);
    display:flex;align-items:center;justify-content:center;}
  .upnext-thumb svg{width:26px;height:26px;fill:rgba(255,255,255,0.55);}
  .upnext-duration{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,0.8);
    color:#fff;font-size:11px;line-height:1;padding:3px 4px;border-radius:3px;}
  .upnext-info{flex:1;min-width:0;padding-top:1px;}
  .upnext-title{font-size:14px;font-weight:500;line-height:1.3;margin:0 0 4px;color:var(--yt-text);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .upnext-channel{font-size:12px;color:var(--yt-secondary);margin:0 0 2px;}
  .upnext-meta{font-size:12px;color:var(--yt-secondary);}
</style>
</head>
<body>
<header class="yt-header">
  <div class="header-left">
    <button class="icon-btn" aria-label="Menu">
      <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="yt-logo">
      <div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <span class="wordmark">YouTube</span>
    </div>
  </div>
  <div class="header-center">
    <div class="search-bar">Search</div>
    <div class="search-btn">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
    </div>
    <button class="icon-btn mic-btn" aria-label="Search with voice">
      <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zM19 11a7 7 0 0 1-14 0M12 18v3"/></svg>
    </button>
  </div>
  <div class="header-right">
    <button class="icon-btn theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
      <span id="sun-icon"></span><span id="moon-icon"></span>
    </button>
    <div class="header-avatar" id="header-avatar">U</div>
  </div>
</header>
<div id="app"></div>

<script>
/* =====================================================================
   HOW TO CONFIGURE THIS FILE
   =====================================================================
   1. Set VIDEO_ID below to the real YouTube video ID used in your study
      (the part after "v=" in a normal YouTube URL). The video must have
      embedding enabled by its owner or the player will show an error.

   2. Edit BASE_TITLE / BASE_CHANNEL if you want a different fake title
      or channel name. These are IDENTICAL across every condition
      (only view count, like count, and comments vary), so edit once.

   3. Edit NUMBERS below to set your actual high/low view and like
      values.

   4. Edit COMMENT_SETS to replace the placeholder comments with
      comments relevant to your actual video, keeping the pos/neu/neg
      grouping intact (5 comments each is a reasonable default; you can
      add or remove without breaking anything).

   5. Edit RECOMMENDED_VIDEOS to change the static "Up next" list shown
      below the comments. These are decorative only (not clickable) and
      identical across every condition.

   6. Deploy: drag this single .html file into Netlify/Vercel/Cloudflare
      Pages (or any static host). No build step, no npm install.

   7. Condition links to hand out (via your Google Form branching):
        yoursite.com/?cond=1   ...   yoursite.com/?cond=12
        yoursite.com/?cond=control

      Condition map (valence x view x like):
        1  = positive, high view, high like
        2  = positive, high view, low  like
        3  = positive, low  view, high like
        4  = positive, low  view, low  like
        5  = neutral,  high view, high like
        6  = neutral,  high view, low  like
        7  = neutral,  low  view, high like
        8  = neutral,  low  view, low  like
        9  = negative, high view, high like
        10 = negative, high view, low  like
        11 = negative, low  view, high like
        12 = negative, low  view, low  like
        control = video only, no title/likes/views/comments
   ===================================================================== */

  // ---- 1. VIDEO ----
  const VIDEO_ID = "dQw4w9WgXcQ"; // <-- REPLACE with your study video's ID

  // ---- 2. TITLE / CHANNEL (identical across all conditions) ----
  const BASE_TITLE   = "Local News Segment - Full Report";
  const BASE_CHANNEL = "Daily Report";
  const UPLOADED_TEXT = "3 days ago";

  // ---- 3. VIEW / LIKE NUMBERS ----
  const NUMBERS = {
    view: { high: 847000,  low: 1284 },
    like: { high: 38000,   low: 84   }
  };

  // ---- 4. COMMENTS (5 per valence, reused across matching conditions) ----
  const COMMENT_SETS = {
    positive: [
      { author: "alex_92",     time: "2 weeks ago", likes: 14, text: "This was so well put together, genuinely enjoyed watching this." },
      { author: "j.moretti",   time: "1 month ago",  likes: 6,  text: "Really appreciate the effort that went into this, well done." },
      { author: "nicole.b",    time: "5 days ago",   likes: 21, text: "One of the better videos I've come across on this topic." },
      { author: "d_hartley",   time: "3 weeks ago",  likes: 3,  text: "Great job, this deserves way more attention than it's getting." },
      { author: "traveler_k",  time: "2 months ago", likes: 9,  text: "Loved every second of this, thanks for sharing." }
    ],
    neutral: [
      { author: "alex_92",     time: "2 weeks ago", likes: 2, text: "Watched this earlier, thought it was okay overall." },
      { author: "j.moretti",   time: "1 month ago",  likes: 0, text: "Interesting take, not really sure how I feel about it." },
      { author: "nicole.b",    time: "5 days ago",   likes: 1, text: "This is fine, nothing special either way." },
      { author: "d_hartley",   time: "3 weeks ago",  likes: 0, text: "Saw this pop up on my feed and decided to check it out." },
      { author: "traveler_k",  time: "2 months ago", likes: 3, text: "Some parts were fine, others less so." }
    ],
    negative: [
      { author: "alex_92",     time: "2 weeks ago", likes: 11, text: "Not a fan of this, honestly kind of disappointing." },
      { author: "j.moretti",   time: "1 month ago",  likes: 4,  text: "Expected a lot more from this, it really fell flat." },
      { author: "nicole.b",    time: "5 days ago",   likes: 17, text: "This didn't really work for me at all." },
      { author: "d_hartley",   time: "3 weeks ago",  likes: 2,  text: "Pretty underwhelming, wouldn't recommend it." },
      { author: "traveler_k",  time: "2 months ago", likes: 7,  text: "Wasn't impressed, felt like a waste of time." }
    ]
  };

  // ---- 5. RECOMMENDED VIDEOS (static "Up next" list, identical across conditions) ----
  const RECOMMENDED_VIDEOS = [
    { title: "How Local News Covers Breaking Stories",     channel: "Newsroom Insights", views: 128000, duration: "8:42"  },
    { title: "Behind the Scenes: A Day in Broadcast News", channel: "Media Explained",   views: 54000,  duration: "12:15" },
    { title: "Top 10 Moments From This Week",              channel: "Weekly Recap",      views: 892000, duration: "6:03"  },
    { title: "Why This Story Went Viral",                  channel: "Culture Watch",     views: 210000, duration: "9:27"  },
    { title: "Reactions From Around the World",            channel: "Global Pulse",      views: 45000,  duration: "5:18"  }
  ];

  /* =====================================================================
     Condition map. Edit numbers above, not this block.
     ===================================================================== */
  const VAL = ["positive", "neutral", "negative"];
  const VIEWS = ["high", "low"];
  const LIKES = ["high", "low"];

  const CONFIG = {};
  let n = 1;
  for (const v of VAL) {
    for (const vw of VIEWS) {
      for (const lk of LIKES) {
        CONFIG[n] = {
          title: BASE_TITLE,
          channel: BASE_CHANNEL,
          uploaded: UPLOADED_TEXT,
          views: NUMBERS.view[vw],
          likes: NUMBERS.like[lk],
          comments: COMMENT_SETS[v]
        };
        n++;
      }
    }
  }
  CONFIG["control"] = { control: true };

  /* =====================================================================
     Rendering — no fetch, no localStorage, no external state.
     Everything below reads only from the CONFIG object above.
     ===================================================================== */
  function formatCount(num) {
    if (num >= 1000000) return (num / 1000000).toFixed(num % 1000000 === 0 ? 0 : 1) + "M";
    if (num >= 1000) return (num / 1000).toFixed(num % 1000 === 0 ? 0 : 1) + "K";
    return String(num);
  }

  function initials(name) {
    return name.trim().charAt(0).toUpperCase();
  }

  // Assigns each commenter a consistent color based on their name, so the
  // same author always gets the same color across every condition, while
  // different commenters look visually distinct. Colors are intentionally
  // neutral (no reds/greens) so they don't accidentally signal valence.
  const AVATAR_PALETTE = ["#5b7fff", "#e0885b", "#3c9d8d", "#a35bd1",
                           "#c6a23c", "#4bacc6", "#c65b8f", "#7a8b52"];
  function avatarColor(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) >>> 0;
    return AVATAR_PALETTE[hash % AVATAR_PALETTE.length];
  }

  function thumbUpSVG() {
    return '<svg viewBox="0 0 24 24"><path d="M2 20h3V9H2v11zM22 10c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L12.17 1 6.59 6.59C6.22 6.95 6 7.45 6 8v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>';
  }
  function thumbUpSmallSVG() {
    return '<svg viewBox="0 0 24 24"><path d="M2 20h3V9H2v11zM22 10c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L12.17 1 6.59 6.59C6.22 6.95 6 7.45 6 8v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>';
  }

  function sunSVG() {
    return '<svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>';
  }
  function moonSVG() {
    return '<svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }

  function playThumbSVG() {
    return '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  }

  function upNextHTML() {
    return RECOMMENDED_VIDEOS.map(v => `
      <div class="upnext-item">
        <div class="upnext-thumb">
          ${playThumbSVG()}
          <span class="upnext-duration">${v.duration}</span>
        </div>
        <div class="upnext-info">
          <p class="upnext-title">${v.title}</p>
          <p class="upnext-channel">${v.channel}</p>
          <p class="upnext-meta">${formatCount(v.views)} views</p>
        </div>
      </div>
    `).join("");
  }

  function toggleTheme() {
    document.body.classList.toggle("dark");
  }
  window.toggleTheme = toggleTheme;

  document.getElementById("sun-icon").outerHTML = sunSVG();
  document.getElementById("moon-icon").outerHTML = moonSVG();
  document.getElementById("header-avatar").style.background = avatarColor("You");

  function playerHTML(videoId) {
    return `<div class="player-wrap"><div class="player-inner">
      <iframe src="https://www.youtube.com/embed/${videoId}?rel=0"
        title="video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen></iframe>
    </div></div>`;
  }

  function renderControl() {
    document.body.classList.add("control");
    document.getElementById("app").innerHTML = `<div class="page">${playerHTML(VIDEO_ID)}</div>`;
  }

  function renderCondition(cfg) {
    const commentsHTML = cfg.comments.map(c => `
      <div class="comment">
        <div class="avatar" style="background:${avatarColor(c.author)}">${initials(c.author)}</div>
        <div class="comment-body">
          <div class="comment-meta"><span class="author">${c.author}</span><span class="time">${c.time}</span></div>
          <p class="comment-text">${c.text}</p>
          <div class="comment-actions">
            <span class="like-icon">${thumbUpSmallSVG()} ${c.likes > 0 ? c.likes : ""}</span>
            <span>REPLY</span>
          </div>
        </div>
      </div>
    `).join("");

    document.getElementById("app").innerHTML = `
      <div class="page">
        <div class="layout">
          <div class="left-col">
            ${playerHTML(VIDEO_ID)}
            <div class="meta">
              <h1 class="video-title">${cfg.title}</h1>
              <div class="view-row">
                <div class="view-count">${formatCount(cfg.views)} views<span class="dot">&bull;</span>${cfg.uploaded}</div>
                <div class="actions">
                  <div class="like-pill">
                    <div class="like-btn">${thumbUpSVG()} ${formatCount(cfg.likes)}</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="channel-row">
              <div class="channel-left">
                <div class="avatar">${initials(cfg.channel)}</div>
                <div class="channel-name">${cfg.channel}</div>
              </div>
              <button class="subscribe-btn">Subscribe</button>
            </div>
          </div>
          <div class="right-col">
            <div class="comments">
              <h2 class="comments-header">${cfg.comments.length} Comments</h2>
              ${commentsHTML}
            </div>
            <div class="upnext">
              ${upNextHTML()}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderError() {
    document.getElementById("app").innerHTML =
      `<div id="error">This link isn't valid. Please return to the survey and use the link provided there.</div>`;
  }

  // ---- entry point ----
  const params = new URLSearchParams(window.location.search);
  const cond = params.get("cond");
  const cfg = cond ? CONFIG[cond] : null;

  if (!cfg) {
    renderError();
  } else if (cfg.control) {
    renderControl();
  } else {
    renderCondition(cfg);
  }
</script>
</body>
</html>
